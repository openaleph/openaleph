worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    index index.html;

    sendfile on;
    client_max_body_size 2000g;
    client_body_timeout 84600s;
    proxy_connect_timeout 84600s;
    proxy_send_timeout 84600s;
    proxy_read_timeout 84600s;
    send_timeout 84600s;
    proxy_buffering off;
    proxy_request_buffering off;

    upstream docker-api {
        server api:8000;
    }

    # CORS: the API allows any origin by default (equivalent to the old
    # in-app flask-cors setup). To restrict cross-origin access to known
    # origins, replace the wildcard match below with an explicit list:
    #   default "";
    #   "https://openrefine.example.org" $http_origin;
    map $http_origin $cors_origin {
        default $http_origin;
    }

    # Rate limiting (was handled in-app for anonymous users): uncomment to
    # limit requests per client IP, and add `limit_req zone=api burst=50
    # nodelay;` to the /api location below.
    # limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    server {
        listen 8080;
        ignore_invalid_headers          off;
        add_header Referrer-Policy            "same-origin";
        add_header X-Clacks-Overhead          "GNU Terry Pratchett";
        add_header X-Content-Type-Options     "nosniff";
        add_header X-Frame-Options            "SAMEORIGIN";
        add_header X-XSS-Protection           "1; mode=block";
        add_header Feature-Policy             "accelerometer 'none'; camera 'none'; geolocation 'none'; gyroscope 'none'; magnetometer 'none'; microphone 'none'; payment 'none'; usb 'none'";
        add_header Permissions-Policy         "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()";
        add_header Content-Security-Policy    "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: *";
        # Enable HSTS at the TLS-terminating proxy in front of this server
        # (this server only speaks plain HTTP on 8080), or uncomment here if
        # upstream headers are passed through:
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            root /assets;
            try_files $uri $uri/ /index.html;

            gzip_static on;
            gzip_types text/plain text/xml text/css
                text/javascript application/x-javascript;
        }

        location /api {
            # NOTE: add_header directives in this block stop inheritance of
            # the server-level headers above, so nosniff is repeated here.
            add_header X-Content-Type-Options           "nosniff" always;

            # CORS (was handled in-app by flask-cors): echo the request
            # origin, since Access-Control-Allow-Origin "*" is invalid in
            # combination with credentialed requests.
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Vary                             "Origin" always;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin      $cors_origin always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Allow-Methods     "GET, HEAD, POST, PUT, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers     $http_access_control_request_headers always;
                add_header Access-Control-Max-Age           "3600" always;
                return 204;
            }

            proxy_pass         http://docker-api;
            proxy_redirect     off;
            proxy_set_header   Host $http_host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

}
